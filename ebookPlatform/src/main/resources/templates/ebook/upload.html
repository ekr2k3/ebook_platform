<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng ebook</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #f5f6fa;
            margin: 0;
            padding: 32px 16px;
            color: #222;
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            background: #fff;
            border-radius: 12px;
            padding: 28px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 24px;
            font-size: 28px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
        }

        input[type="text"],
        input[type="number"],
        textarea,
        input[type="file"],
        select {
            width: 100%;
            padding: 12px;
            border: 1px solid #dcdde1;
            border-radius: 8px;
            font-size: 15px;
        }

        textarea {
            min-height: 140px;
            resize: vertical;
        }

        .hint {
            margin-top: 6px;
            font-size: 13px;
            color: #666;
        }

        .file-name {
            margin-top: 8px;
            font-size: 14px;
            color: #2f3640;
        }

        .alert {
            padding: 12px 14px;
            border-radius: 8px;
            margin-bottom: 18px;
            font-size: 14px;
        }

        .alert-success {
            background: #eafaf1;
            color: #1e7e34;
            border: 1px solid #b7ebc6;
        }

        .alert-error {
            background: #fff5f5;
            color: #c0392b;
            border: 1px solid #f5c6cb;
        }

        .field-error {
            color: #c0392b;
            font-size: 13px;
            margin-top: 6px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            transform: scale(1.1);
        }

        .cover-preview {
            margin-top: 10px;
            max-width: 160px;
            max-height: 220px;
            display: none;
            border-radius: 8px;
            border: 1px solid #dcdde1;
            object-fit: cover;
        }

        .actions {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-top: 24px;
        }

        button {
            background: #2f80ed;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: 600;
        }

        button:hover {
            background: #1c6dd0;
        }

        .secondary-link {
            color: #555;
            text-decoration: none;
            font-size: 14px;
        }

        .secondary-link:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>Đăng ebook</h1>

    <div th:if="${successMessage != null}" class="alert alert-success">
        <span th:text="${successMessage}"></span>
    </div>

    <div th:if="${errorMessage != null}" class="alert alert-error">
        <span th:text="${errorMessage}"></span>
    </div>

    <form th:action="@{/seller/ebooks/upload}"
          th:object="${form}"
          method="post"
          enctype="multipart/form-data">

        <div class="form-group">
            <label for="title">Tên sách</label>
            <input type="text" id="title" th:field="*{title}" placeholder="Nhập tên ebook">
            <div class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
        </div>

        <div class="form-group">
            <label for="author">Tác giả</label>
            <input type="text" id="author" th:field="*{author}" placeholder="Nhập tên tác giả">
            <div class="field-error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
        </div>

        <div class="form-group">
            <label for="description">Mô tả</label>
            <textarea id="description"
                      th:field="*{description}"
                      placeholder="Nhập mô tả ebook"></textarea>
            <div class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></div>
        </div>

        <div class="form-group">
            <label for="file">File ebook</label>
            <input type="file" id="file" th:field="*{file}" accept=".pdf,.epub">
            <div class="hint">Chỉ chấp nhận file PDF hoặc EPUB.</div>
            <div id="selectedFileName" class="file-name">Chưa chọn file</div>
            <div class="field-error" th:if="${#fields.hasErrors('file')}" th:errors="*{file}"></div>
        </div>

        <div class="form-group">
            <label for="coverUrl">Ảnh bìa</label>
            <input type="file" id="coverUrl" th:field="*{coverUrl}" accept="image/*">
            <div class="hint">Chấp nhận JPG, PNG, WEBP...</div>
            <div id="selectedName" class="file-name">Chưa chọn ảnh bìa</div>
            <img id="coverPreview" class="cover-preview" alt="Preview ảnh bìa">
            <div class="field-error" th:if="${#fields.hasErrors('coverUrl')}" th:errors="*{coverUrl}"></div>
        </div>

        <div class="form-group">
            <label for="totalPages">Tổng số trang</label>
            <input type="number" id="totalPages" th:field="*{totalPages}" min="1" placeholder="Ví dụ: 250">
            <div class="hint">Có thể cho người bán nhập tay hoặc backend tự tính lại khi xử lý file PDF.</div>
            <div class="field-error" th:if="${#fields.hasErrors('totalPages')}" th:errors="*{totalPages}"></div>
        </div>

        <div class="form-group">
            <label for="status">Trạng thái</label>
            <select id="status" th:field="*{status}">
                <option value="">-- Chọn trạng thái --</option>
                <option value="DRAFT">Nháp</option>
                <option value="PUBLISHED">Xuất bản</option>
            </select>
            <div class="field-error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></div>
        </div>

        <div class="form-group">
            <label>Cho phép preview</label>
            <div class="checkbox-group">
                <input type="checkbox" id="previewable" th:field="*{previewable}">
                <label for="previewable" style="margin-bottom: 0; font-weight: 400;">
                    Ebook này có thể xem trước
                </label>
            </div>
            <div class="hint">Checked = true, bỏ chọn = false</div>
            <div class="field-error" th:if="${#fields.hasErrors('previewable')}" th:errors="*{previewable}"></div>
        </div>

        <div class="actions">
            <button type="submit">Tải lên</button>
            <a th:href="@{/seller/dashboard}" class="secondary-link">Quay lại</a>
        </div>
    </form>
</div>

<script>
    const fileInput = document.getElementById('file');
    const selectedFileName = document.getElementById('selectedFileName');

    if (fileInput && selectedFileName) {
        fileInput.addEventListener('change', function () {
            if (this.files && this.files.length > 0) {
                selectedFileName.textContent = 'Đã chọn: ' + this.files[0].name;
            } else {
                selectedFileName.textContent = 'Chưa chọn file';
            }
        });
    }

    const coverInput = document.getElementById('coverFile');
    const selectedCoverFileName = document.getElementById('selectedCoverFileName');
    const coverPreview = document.getElementById('coverPreview');

    if (coverInput && selectedCoverFileName && coverPreview) {
        coverInput.addEventListener('change', function () {
            if (this.files && this.files.length > 0) {
                const file = this.files[0];
                selectedCoverFileName.textContent = 'Đã chọn: ' + file.name;

                const reader = new FileReader();
                reader.onload = function (e) {
                    coverPreview.src = e.target.result;
                    coverPreview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            } else {
                selectedCoverFileName.textContent = 'Chưa chọn ảnh bìa';
                coverPreview.src = '';
                coverPreview.style.display = 'none';
            }
        });
    }
</script>
</body>
</html>
