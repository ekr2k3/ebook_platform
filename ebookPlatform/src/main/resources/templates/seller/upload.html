<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Ebook upload</title>
    <style>
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            padding: 2rem;
            background: #f7fafc;
        }

        form {
            background: #ffffff;
            padding: 1.5rem;
            border-radius: 8px;
            box-shadow: 0 6px 20px rgba(15, 23, 42, 0.08);
            max-width: 600px;
        }

        .field {
            margin-bottom: 1rem;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        input[type="text"],
        input[type="number"],
        select,
        textarea {
            width: 100%;
            padding: 0.45rem 0.6rem;
            border: 1px solid #cbd5f5;
            border-radius: 4px;
        }

        .error {
            color: #b91c1c;
            font-size: 0.9rem;
        }

        .success {
            margin-bottom: 1rem;
            padding: 0.75rem;
            border-radius: 6px;
            background: #ecfccb;
            border: 1px solid #bef264;
            color: #365314;
        }

        button {
            background: #2563eb;
            color: white;
            padding: 0.75rem 1.25rem;
            border: none;
            border-radius: 4px;
            font-size: 1rem;
            cursor: pointer;
        }
    </style>
</head>
<body>
<h1>Seller: upload ebook</h1>

<div th:if="${success}" class="success" th:text="${success}"></div>

<form th:action="@{/seller/ebooks/upload}" th:object="${form}" method="post" enctype="multipart/form-data">
    <div class="field">
        <label for="sellerId">Seller ID</label>
        <input type="number" id="sellerId" th:field="*{sellerId}" min="1"/>
        <div class="error" th:if="${#fields.hasErrors('sellerId')}" th:errors="*{sellerId}"></div>
    </div>

    <div class="field">
        <label for="title">Title</label>
        <input type="text" id="title" th:field="*{title}" required/>
        <div class="error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></div>
    </div>

    <div class="field">
        <label for="author">Author</label>
        <input type="text" id="author" th:field="*{author}" required/>
        <div class="error" th:if="${#fields.hasErrors('author')}" th:errors="*{author}"></div>
    </div>

    <div class="field">
        <label for="format">Format</label>
        <select id="format" th:field="*{format}">
            <option th:each="format : ${formats}" th:value="${format}" th:text="${format}"></option>
        </select>
        <div class="error" th:if="${#fields.hasErrors('format')}" th:errors="*{format}"></div>
    </div>

    <div class="field">
        <label for="description">Description</label>
        <textarea id="description" rows="4" th:field="*{description}"></textarea>
    </div>

    <div class="field">
        <label for="file">Ebook (PDF/EPUB, max 50MB)</label>
        <input type="file" id="file" th:field="*{file}" accept=".pdf,.epub"/>
        <div class="error" th:if="${#fields.hasErrors('file')}" th:errors="*{file}"></div>
    </div>

    <div class="error" th:if="${#fields.hasGlobalErrors()}" th:errors="*{__all__}"></div>
    <button type="submit">Upload ebook</button>
</form>
</body>
</html>
